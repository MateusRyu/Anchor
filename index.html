<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Proteção</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --bg: #f1f5f9;
            --accent: #3b82f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            border-top: 8px solid var(--primary);
    }
        }

        h1 { font-size: 1.5rem; margin-bottom: 1rem; }

        .switch-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px; width: 26px;
            left: 4px; bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(26px); }

        #status-text {
            font-weight: bold;
            margin-top: 15px;
            display: block;
        }

        .on { color: #059669; }
        .off { color: #dc2626; }

        .anchor-icon {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="anchor-icon">⚓</div>
    <h1>Anchor</h1>
    <p>Sua âncora digital contra fechamentos acidentais.</p>
    
    <div class="switch-container">
        <span>OFF</span>
        <label class="switch">
            <input type="checkbox" id="protection-toggle">
            <span class="slider"></span>
        </label>
        <span>ON</span>
    </div>

    <span id="status-text" class="off">Proteção Desativada</span>
</div>

<script>
    const toggle = document.getElementById('protection-toggle');
    const statusText = document.getElementById('status-text');

    function preventClose(e) {
        if (toggle.checked) {
            e.preventDefault();
            e.returnValue = ''; // Exibe o alerta padrão do navegador
        }
    }

    window.addEventListener('beforeunload', preventClose);

    toggle.addEventListener('change', () => {
        if (toggle.checked) {
            statusText.innerText = "Proteção ATIVADA ✅";
            statusText.className = "on";
        } else {
            statusText.innerText = "Proteção Desativada ❌";
            statusText.className = "off";
        }
    });
</script>

</body>
</html>
