<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Proteção</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/unprotected/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/unprotected/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/unprotected/favicon-16x16.png">
    <link rel="manifest" href="/assets/unprotected/site.webmanifest">
    <link rel="stylesheet" href="/assets/style.css">
</head>
<body>

<div class="card">
    <div class="anchor-icon">⚓</div>
    <h1>Anchor</h1>
    <p>Sua âncora digital contra fechamentos acidentais.</p>
    
    <div class="switch-container">
        <span>OFF</span>
        <label class="switch">
            <input type="checkbox" id="protection-toggle">
            <span class="slider"></span>
        </label>
        <span>ON</span>
    </div>

    <div id="status-container" class="off">
        <span class="status-text status-on">Proteção ATIVADA ✅</span>
        <span class="status-text status-off">Proteção Desativada ❌</span>
    </div>
</div>
